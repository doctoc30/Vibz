<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VENEER · HYPER ELITE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #FDFBF7; --gold: #C5A059; --dark: #0F0F0F; }
        body { background-color: var(--cream); font-family: 'Inter', sans-serif; color: var(--dark); }
        
        .heading-extreme {
            font-family: 'Syncopate', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.85;
        }

        /* Full Portrait Hero Logic */
        .hero-viewport {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            overflow: hidden;
        }

        .hero-portrait-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image covers full area without distortion */
            z-index: 1;
            opacity: 0.9;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            mix-blend-mode: multiply; /* Optional: adds to the elite aesthetic on cream background */
        }

        /* Glass pill for Handcrafted Edge */
        .floating-pill {
            position: absolute;
            bottom: 15vh;
            z-index: 20;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 9999px;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .glass-nav {
            background: rgba(253, 251, 247, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass-nav px-6 py-5 flex justify-between items-center">
        <div class="text-2xl heading-extreme">VENEER.</div>
        <div class="space-y-1.5 cursor-pointer">
            <div class="w-8 h-0.5 bg-black"></div>
            <div class="w-8 h-0.5 bg-black"></div>
        </div>
    </nav>

    <section class="hero-viewport">
        <div class="hero-content" data-aos="fade-down">
            <h1 class="text-6xl md:text-[10rem] heading-extreme mb-4">EDGE<br>MASTERY</h1>
            <p class="text-xs md:text-sm tracking-[.5em] font-bold opacity-60 uppercase">— SINCE 2026 · TOKYO —</p>
        </div>

        <img src="https://raw.githubusercontent.com/doctoc30/Vibz/main/images/barber-41-image1.jpg" 
             alt="Veneer Elite Storefront" 
             class="hero-portrait-img"
             data-aos="zoom-out" 
             data-aos-duration="2000">

        <div class="floating-pill" data-aos="fade-up" data-aos-delay="500">
            ✂️ HANDCRAFTED EDGE
        </div>
    </section>

    <section class="py-32 px-10 bg-white">
        <div class="max-w-4xl mx-auto" data-aos="fade-up">
            <h2 class="text-5xl md:text-7xl heading-extreme mb-10">THE<br>PHILOSOPHY</h2>
            <p class="text-2xl md:text-3xl font-light leading-relaxed text-stone-700">
                We don't just cut hair; we curate identity. Using precise architectural methods and heritage tools, Veneer is the pinnacle of grooming.
            </p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200, once: true });
    </script>
</body>
</html>
